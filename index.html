<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <title>Sizer Video Downloader</title>
  <style>
    /* TEMEL STİL (Neon Dark Tema) */
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #090909;
      color: #fff;
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #333;
    }

    .title-bar {
      height: 40px;
      min-height: 40px;
      flex-shrink: 0;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      -webkit-app-region: drag;
      border-bottom: 1px solid #333;
    }

    .title {
      font-size: 14px;
      color: #888;
      letter-spacing: 1px;
      font-weight: bold;
    }

    .controls {
      display: flex;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .btn-circle {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: background 0.2s;
      position: relative;
    }

    .btn-circle::before {
      content: '';
      position: absolute;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-circle:hover::before {
      opacity: 1;
    }

    .settings-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      -webkit-app-region: no-drag;
      transition: color 0.2s;
    }

    .settings-btn:hover {
      color: #fff;
    }

    .close {
      background: #ff5f56;
    }

    .close::before {
      content: '×';
      color: #7a0000;
      font-size: 14px;
      font-weight: bold;
      line-height: 14px;
    }

    .min {
      background: #ffbd2e;
    }

    .min::before {
      content: '−';
      color: #8c5a00;
      font-size: 14px;
      font-weight: bold;
      line-height: 14px;
    }

    /* İÇERİK */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at 50% -20%, #1a1a40, #000);
      padding: 20px;
      transition: 0.3s;
      position: relative;
    }

    .header-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
      margin-bottom: 20px;
    }

    .logo {
      display: none;
    }

    h1 {
      display: none;
    }

    /* Input Alanı */
    .input-wrapper {
      position: relative;
      flex: 1;
    }

    input {
      width: 100%;
      padding: 12px 40px 12px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      outline: none;
      transition: 0.3s;
      font-size: 14px;
      box-sizing: border-box;
      margin: 0;
    }

    input:focus {
      border-color: #00c3ff;
      box-shadow: 0 0 15px rgba(0, 195, 255, 0.2);
    }

    /* Yapıştır Butonu / İkonu */
    .paste-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: #aaa;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 5px;
      border-radius: 4px;
      transition: 0.2s;
    }

    .paste-btn:hover {
      color: #00c3ff;
      background: rgba(0, 195, 255, 0.1);
    }

    /* Ana Buton */
    .action-btn {
      padding: 0 40px;
      height: 44px;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #00c3ff, #0051ff);
      color: #fff;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(0, 81, 255, 0.4);
      transition: 0.2s;
      min-width: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(0, 81, 255, 0.6);
    }

    /* GİZLİ BÖLÜMLER */
    .action-wrapper {
      width: 100%;
      max-width: 500px;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 20px;
    }

    #quality-section {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.5s;
    }

    #success-section {
      display: none;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      width: 100%;
      gap: 15px;
      animation: fadeIn 0.5s;
    }

    /* Seçim Kutusu */
    select {
      padding: 12px 16px;
      flex: 1;
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      border: 1px solid #333;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffffff%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
      background-repeat: no-repeat;
      background-position: right 14px top 50%;
      background-size: 10px auto;
      margin: 0;
    }

    select:focus,
    select:hover {
      border-color: #00c3ff;
      box-shadow: 0 0 15px rgba(0, 195, 255, 0.15);
      background-color: rgba(255, 255, 255, 0.1);
    }

    optgroup,
    option {
      background: #111;
      color: #fff;
      padding: 10px;
    }

    /* İkincil Butonlar */
    .icon-btn {
      width: 44px;
      height: 44px;
      background: #222;
      border: 1px solid #444;
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      padding: 0;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      background: #333;
      border-color: #fff;
      transform: scale(1.05);
    }

    .download-btn {
      background: linear-gradient(135deg, #00c3ff, #0051ff);
      border: none;
      box-shadow: 0 4px 15px rgba(0, 81, 255, 0.4);
    }

    .download-btn:hover {
      background: linear-gradient(135deg, #00e5ff, #0073ff);
      box-shadow: 0 6px 20px rgba(0, 81, 255, 0.6);
    }

    .secondary-btn {
      padding: 0 20px;
      height: 44px;
      background: #222;
      border: 1px solid #444;
      color: #ccc;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s;
      font-size: 14px;
      font-weight: 500;
      box-sizing: border-box;
    }

    .secondary-btn:hover {
      background: #333;
      color: #fff;
      border-color: #fff;
    }

    .btn-play {
      border-color: #00ff88;
      color: #00ff88;
    }

    .btn-play:hover {
      background: rgba(0, 255, 136, 0.1);
    }

    /* Durum Metni */
    #status {
      margin-top: 25px;
      font-size: 14px;
      font-weight: 600;
      color: #ccc;
      font-family: 'Segoe UI', monospace;
      min-height: 20px;
      padding: 10px 15px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #333;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      letter-spacing: 0.5px;
      text-align: center;
      width: 100%;
      max-width: 500px;
      box-sizing: border-box;
    }

    .status-loading {
      color: #00c3ff !important;
      border-color: rgba(0, 195, 255, 0.4) !important;
      background: rgba(0, 195, 255, 0.05) !important;
    }

    .status-success {
      color: #00ff88 !important;
      border-color: rgba(0, 255, 136, 0.4) !important;
      background: rgba(0, 255, 136, 0.05) !important;
    }

    .status-error {
      color: #ff4444 !important;
      border-color: rgba(255, 68, 68, 0.4) !important;
      background: rgba(255, 68, 68, 0.05) !important;
    }

    /* Floating History Butonu */
    .history-float-btn {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: #222;
      border: 1px solid #444;
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
      z-index: 50;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .history-float-btn:hover {
      background: #00c3ff;
      border-color: #00c3ff;
      color: #000;
      transform: scale(1.1);
    }

    /* History Modal */
    #historyModal .modal-content {
      width: 90%;
      max-width: 600px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    #historyModal .modal-header {
      flex-shrink: 0;
    }

    .history-list-modal {
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
      padding-right: 5px;
      margin-top: 15px;
      /* En fazla odaklanılabilir şekilde yükseklik */
      max-height: 300px;
    }

    .history-item-modal {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      padding: 10px;
      border-radius: 8px;
      border-left: 3px solid #00c3ff;
    }

    .history-thumb {
      width: 80px;
      height: 45px;
      border-radius: 4px;
      object-fit: cover;
      margin-right: 15px;
      background: #000;
      flex-shrink: 0;
    }

    .history-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      /* Text truncation için gerekli */
    }

    .history-title-modal {
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .history-actions-modal {
      display: flex;
      gap: 8px;
    }

    .history-actions-modal button {
      background: #333;
      border: none;
      color: #fff;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .history-actions-modal button:hover {
      background: #00c3ff;
      color: #000;
    }


    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #111;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #00c3ff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Settings Modal */
    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(5px);
    }

    .modal-content {
      background: #151515;
      border: 1px solid #333;
      padding: 20px;
      border-radius: 8px;
      width: 250px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .modal-header {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .modal-close {
      position: absolute;
      right: 0;
      background: #ff5f56;
      border: 1px solid #e0443e;
      color: transparent;
      cursor: pointer;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      padding: 0;
    }

    .modal-close:hover {
      opacity: 0.8;
    }

    /* Flag Buttons */
    .flags-container {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .flag-btn {
      background: #222;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 5px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.2s;
    }

    .flag-btn:hover {
      background: #333;
    }

    .flag-btn.active {
      border-color: #00c3ff;
      background: rgba(0, 195, 255, 0.1);
    }

    .flag-icon {
      width: 40px;
      height: auto;
      border-radius: 4px;
      display: block;
    }
  </style>
</head>

<body>
  <div class="title-bar">
    <button class="settings-btn" id="openSettingsBtn" title="Ayarlar / Settings">
      <svg fill="currentColor" width="16px" height="16px" viewBox="0 0 24 24">
        <path
          d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.68 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z" />
      </svg>
    </button>
    <div class="title" style="flex: 1; text-align: center;">Sizer Video Downloader</div>
    <div class="controls">
      <button class="btn-circle min" id="minBtn"></button>
      <button class="btn-circle close" id="closeBtn"></button>
    </div>
  </div>

  <div class="content">
    <div class="header-container">
      <div class="logo">⚡</div>
    </div>

    <!-- Durum Metni (Moved up) -->
    <div id="status" style="margin-top: 0; margin-bottom: 20px;" data-i18n="statusReady">Hazır</div>

    <div class="action-wrapper">
      <div id="input-section" style="display: flex; gap: 10px; width: 100%; max-width: 500px;">
        <div class="input-wrapper">
          <input type="text" id="urlInput" placeholder="Bağlantıyı yapıştır..."
            data-i18n-placeholder="inputPlaceholder">
          <button class="paste-btn" id="pasteBtn" title="Panodan Yapıştır" data-i18n-title="pasteTitle">
            <svg fill="currentColor" width="18px" height="18px" viewBox="0 0 24 24">
              <path
                d="M19,3H14.82C14.4,1.84 13.3,1 12,1C10.7,1 9.6,1.84 9.18,3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M12,3A1,1 0 0,1 13,4A1,1 0 0,1 12,5A1,1 0 0,1 11,4A1,1 0 0,1 12,3M19,19H5V5H7V7H17V5H19V19Z" />
            </svg>
          </button>
        </div>
        <button class="icon-btn download-btn" id="analyzeBtn" title="Analiz Et" data-i18n-title="analyzeTitle">
          <svg fill="#fff" width="20px" height="20px" viewBox="0 0 24 24">
            <path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" />
          </svg>
        </button>
      </div>

      <div id="quality-section">
        <img id="video-thumbnail"
          style="max-width: 100%; height: auto; max-height: 180px; border-radius: 8px; margin-bottom: 10px; display: none; object-fit: cover;">
        <p style="color:#aaa; font-size:13px; margin-bottom:5px;" id="video-title">Video Başlığı</p>

        <div
          style="display: flex; justify-content: center; align-items: center; gap: 10px; width: 100%; margin-top: 5px;">
          <!-- Kalite Seçimi -->
          <select id="qualitySelect">
            <option value="best-mp4" data-i18n="qualityBestMp4">En Yüksek (MP4)</option>
            <option value="best-mkv" data-i18n="qualityBestMkv">En Yüksek (MKV)</option>
            <optgroup label="MP4 (Video + Ses)">
              <option value="8k-mp4">8K Ultra HD (4320p) - MP4</option>
              <option value="4k-mp4">4K Ultra HD (2160p) - MP4</option>
              <option value="2k-mp4">2K Quad HD (1440p) - MP4</option>
              <option value="1080p-mp4">Full HD (1080p) - MP4</option>
              <option value="720p-mp4">HD (720p) - MP4</option>
              <option value="480p-mp4">SD (480p) - MP4</option>
              <option value="360p-mp4">Düşük (360p) - MP4</option>
              <option value="240p-mp4">Çok Düşük (240p) - MP4</option>
              <option value="144p-mp4">Minimum (144p) - MP4</option>
            </optgroup>
            <optgroup label="MKV (Video + Ses)">
              <option value="8k-mkv">8K Ultra HD (4320p) - MKV</option>
              <option value="4k-mkv">4K Ultra HD (2160p) - MKV</option>
              <option value="2k-mkv">2K Quad HD (1440p) - MKV</option>
              <option value="1080p-mkv">Full HD (1080p) - MKV</option>
              <option value="720p-mkv">HD (720p) - MKV</option>
              <option value="480p-mkv">SD (480p) - MKV</option>
              <option value="360p-mkv">Düşük (360p) - MKV</option>
              <option value="240p-mkv">Çok Düşük (240p) - MKV</option>
              <option value="144p-mkv">Minimum (144p) - MKV</option>
            </optgroup>
            <optgroup label="Sadece Ses">
              <option value="opus">OPUS (En İyi Kalite)</option>
              <option value="mp3">MP3</option>
            </optgroup>
          </select>

          <!-- Sadece İkon İçeren Butonlar (Sağında) -->
          <button class="icon-btn" id="backBtn" title="Geri Dön" data-i18n-title="backTitle">
            <svg fill="#fff" width="20px" height="20px" viewBox="0 0 24 24">
              <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
            </svg>
          </button>
          <button class="icon-btn download-btn" id="downloadBtn" title="İndirmeyi Başlat"
            data-i18n-title="downloadTitle">
            <svg fill="#fff" width="20px" height="20px" viewBox="0 0 24 24">
              <path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" />
            </svg>
          </button>
          <button class="icon-btn" id="cancelBtn" title="İndirmeyi İptal Et" data-i18n-title="cancelTitle"
            style="display: none; background: #ff4444; border-color: #ff4444;">
            <svg fill="#fff" width="20px" height="20px" viewBox="0 0 24 24">
              <path
                d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
            </svg>
          </button>
        </div>
      </div>

    </div>

    <!-- Floating History Button -->
    <button class="history-float-btn" id="openHistoryBtn" title="İndirme Geçmişi" data-i18n-title="historyTitle">
      <svg fill="currentColor" width="20px" height="20px" viewBox="0 0 24 24">
        <path
          d="M13.5,8H12V13L16.28,15.54L17,14.33L13.5,12.25V8M13,3A9,9 0 0,0 4,12H1L4.96,16.03L9,12H6A7,7 0 0,1 13,5A7,7 0 0,1 20,12A7,7 0 0,1 13,19C11.07,19 9.32,18.21 8.06,16.94L6.64,18.36C8.27,20 10.5,21 13,21A9,9 0 0,0 22,12A9,9 0 0,0 13,3Z" />
      </svg>
    </button>
  </div>

  <!-- Settings Modal -->
